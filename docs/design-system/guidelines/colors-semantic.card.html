<!-- @dsCard group="Colors" viewport="700x160" name="Semantic Roles" subtitle="How brand colors map to UI meaning" -->
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);padding:16px;display:flex;gap:10px;flex-wrap:wrap}.chip{padding:10px 14px;border-radius:var(--radius-md);font-size:13px;color:#fff;font-family:var(--font-mono)}</style>
<div class="chip" style="background:var(--accent-primary)">--accent-primary</div>
<div class="chip" style="background:var(--accent-secondary)">--accent-secondary</div>
<div class="chip" style="background:var(--accent-amber);color:#1c1c1e">--accent-amber</div>
<div class="chip" style="background:var(--link)">--link</div>
<div class="chip" style="background:var(--success)">--success</div>
<div class="chip" style="background:var(--danger)">--danger</div>
<div class="chip" style="background:var(--bg-inverse)">--bg-inverse</div>
<div class="chip" style="background:var(--surface-card);color:#1c1c1e;border:1px solid var(--border-subtle)">--surface-card</div>
